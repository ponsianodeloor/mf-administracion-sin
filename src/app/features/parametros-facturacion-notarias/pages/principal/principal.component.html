<div class="container">
  <div class="breadcrumb-container">
    <app-breadcrums [breadcrumbItems]="breadcrumbItems"></app-breadcrums>
    <button mat-raised-button color="primary" (click)="openDialog()" *ngIf="!data">
      <mat-icon>add</mat-icon>
      <span>Crear Registro</span>
    </button>
  </div>
  <div class="table-container">
    <app-tabla [displayedColumns]="displayedColumns" [data]="dataSource" [noPaginated]="true" (selectRow)="onSelectRow($event)"></app-tabla>
  </div>
</div>
