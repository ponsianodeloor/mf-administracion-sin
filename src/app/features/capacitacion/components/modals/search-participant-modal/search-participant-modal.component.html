<form [formGroup]="searchForm" (ngSubmit)="onSearch()">
  <div class="row">
    <div class="col-12">
      <div class="mt-2 mx-2 d-flex align-items-center">
        <mat-form-field appearance="outline" class="flex-grow-1">
          <mat-label>Nombre del participante</mat-label>
          <input matInput placeholder="Búsqueda" formControlName="search" />
        </mat-form-field>
      </div>
    </div>
    <div class="col-2">
      <button mat-raised-button class="mx-2" color="primary" type="submit">Buscar</button>
    </div>
    <div class="col-2">
      <button mat-stroked-button class="mx-2" type="button" (click)="onCancel()">Cancelar</button>
    </div>
    <div class="col-8">
      &nbsp;
    </div>
  </div>
</form>

<div *ngIf="dataSource?.length > 0; else noData">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 mt-2">
    <!-- Columna apellidosNombres -->
    <ng-container matColumnDef="apellidosNombres">
      <th mat-header-cell *matHeaderCellDef> Seleccionar Participante </th>
      <td mat-cell *matCellDef="let element"> {{ element.apellidosNombres }} </td>
    </ng-container>

    <!-- Columna de acción (botón seleccionar) -->
    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef> Acción </th>
      <td mat-cell *matCellDef="let element">
        <button mat-raised-button color="primary" (click)="onSelectParticipant(element)">
          Seleccionar
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<ng-template #noData>
  <p class="text-center mt-2">&nbsp;</p>
</ng-template>
