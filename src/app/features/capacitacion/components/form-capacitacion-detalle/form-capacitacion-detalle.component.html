<form [formGroup]="form" class="form-container">
  <div class="form-header"> 
    <h2>Asistentes</h2>
    <button mat-icon-button (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Capacitación</mat-label>
    <mat-select formControlName="capacitacion">
      <mat-option [value]="capacitacion.id">{{ capacitacion.nombreCapacitacion }}</mat-option>
    </mat-select>
    <mat-error *ngIf="form.get('capacitacion')?.hasError('required')">
      La capacitación es requerida
    </mat-error>
  </mat-form-field>

  <div class="row">
    <mat-form-field appearance="outline" class="participant-field">
      <mat-label>Participante</mat-label>
      <mat-select formControlName="participante">
        <mat-option *ngFor="let part of participantes" [value]="part">{{ part }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('participante')?.hasError('required')">
        El participante es requerido
      </mat-error>
    </mat-form-field>
    <div class="asiste-toggle">
      <label>Asiste</label>
      <mat-slide-toggle formControlName="asiste"></mat-slide-toggle>
    </div>
  </div>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Observaciones</mat-label>
    <textarea matInput formControlName="observaciones" rows="4"></textarea>
  </mat-form-field>

  <div class="actions">
    <div class="left-action">
      <button mat-stroked-button type="button" (click)="onCancel()">Cancelar</button>
      <button *ngIf="data.detalleCapacitacion" mat-stroked-button color="warn" type="button" (click)="onDelete()">Eliminar Participante</button>
    </div>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">{{ data.detalleCapacitacion ? 'Aplicar Cambios' : 'Ingresar Participante' }}</button>
  </div>
</form>
