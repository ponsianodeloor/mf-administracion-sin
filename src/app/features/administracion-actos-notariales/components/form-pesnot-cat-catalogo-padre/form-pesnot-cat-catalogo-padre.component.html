<div class="container-fluid">
  <mat-card>
    <mat-card-header>
      <div class="header-flex">
        <span class="mat-card-title">Categorias de Actos Notariales</span>
        <button mat-raised-button color="primary" (click)="onNew()" *ngIf="!editSave">
          <mat-icon>add</mat-icon>
          Nuevo
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" class="form-container">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" placeholder="Ingrese el nombre">
          <mat-error *ngIf="form.get('nombre')?.hasError('required')">
            El nombre es requerido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>http://pesnot.funcionjudicial.gob.ec/icons#dfiusahfksdjcbksjdnfk</mat-label>
          <input matInput formControlName="urlNotarias" placeholder="Ingrese la URL del icono">
          <mat-error *ngIf="form.get('urlNotarias')?.hasError('required')">
            La URL del icono es requerida
          </mat-error>
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <div class="d-flex gap-2 justify-content-end">
        <button mat-raised-button class="color-red" (click)="onCancel()" *ngIf="editSave">
          <mat-icon>cancel</mat-icon>
          Cancelar
        </button>
        <button mat-raised-button color="primary" (click)="onEdit()" *ngIf="!editSave">
          <mat-icon>edit</mat-icon>
          Editar
        </button>
        <button mat-raised-button color="primary" (click)="onSubmit()" *ngIf="editSave">
          <mat-icon>save</mat-icon>
          Guardar
        </button>
      </div>
    </mat-card-actions>
  </mat-card>
</div>
