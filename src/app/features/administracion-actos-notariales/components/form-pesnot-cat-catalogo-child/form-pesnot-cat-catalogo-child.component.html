<div class="container-fluid">
  <mat-card>
    <mat-card-header>
      <div class="header-flex">
        <span class="mat-card-title">Sub-Categoria de Actos Notariales</span>
        <button mat-raised-button color="primary" (click)="onNew()" *ngIf="!editSave">
          <mat-icon>add</mat-icon>
          Nuevo
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" class="form-container">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" placeholder="Ingrese el nombre">
          <mat-error *ngIf="form.get('nombre')?.hasError('required')">
            El nombre es requerido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Normativa Notaria</mat-label>
          <input matInput formControlName="normativaNotaria" placeholder="Ingrese la normativa">
          <mat-error *ngIf="form.get('normativaNotaria')?.hasError('required')">
            La normativa es requerida
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Tipo Acto Notarial</mat-label>
          <mat-select formControlName="tipoActoNotarial">
            <mat-option value="TELEMATICO">TELEMATICO</mat-option>
            <mat-option value="PRESENCIAL">PRESENCIAL</mat-option>
            <mat-option value="ELECTRONICO">ELECTRONICO</mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('tipoActoNotarial')?.hasError('required')">
            El tipo de acto notarial es requerido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Catálogo</mat-label>
          <mat-select formControlName="idCatalogosPesnot">
            <mat-option *ngFor="let catalogo of catalogos" [value]="catalogo.value">
              {{catalogo.nombre}}
            </mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('idCatalogosPesnot')?.hasError('required')">
            El catálogo es requerido
          </mat-error>
        </mat-form-field>

        <mat-checkbox formControlName="isPadre" class="full-width">
          Es Padre
        </mat-checkbox>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <div class="d-flex gap-2 justify-content-end">
        <button mat-raised-button class="color-red" (click)="onCancel()" *ngIf="editSave">
          <mat-icon>cancel</mat-icon>
          Cancelar
        </button>
        <button mat-raised-button color="primary" (click)="onEdit()" *ngIf="!editSave">
          <mat-icon>edit</mat-icon>
          Editar
        </button>
        <button mat-raised-button color="primary" (click)="onSubmit()" *ngIf="editSave">
          <mat-icon>save</mat-icon>
          Guardar
        </button>
      </div>
    </mat-card-actions>
  </mat-card>
</div>
