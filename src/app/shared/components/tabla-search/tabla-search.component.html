<div class="tabla-contenedor">
  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container *ngFor="let column of displayedColumns" [matColumnDef]="column.name">
      <th mat-header-cell *matHeaderCellDef
          [attr.mat-sort-header]="column.type !== 'action' && column.type !== 'download' ? '' : null"
          [attr.data-type]="column.type"
          [ngStyle]="getColumnStyle(column)"
          [class.no-sort]="column.type === 'action' || column.type === 'download'"
          [class.custom-width]="column.width">
        <div class="header-flex">
          <span class="header-content">{{ getColumnHeader(column.name) }}</span>
          <ng-container *ngIf="isColumnFilterable(column.name)">
            <button mat-icon-button
                    class="filter-button"
                    [matMenuTriggerFor]="filterMenu"
                    (click)="setActiveColumn(column.name); $event.stopPropagation()">
              <mat-icon>filter_list</mat-icon>
            </button>
          </ng-container>
        </div>
      </th>
      <td mat-cell *matCellDef="let row"
          [attr.data-type]="column.type"
          [attr.data-label]="column.name"
          [ngStyle]="getColumnStyle(column)"
          [matTooltip]="shouldShowTooltip(column) ? getColumnValue(row, column.name) : ''"
          [matTooltipPosition]="'above'"
          [class.custom-width]="column.width">
        <ng-container *ngIf="column.type === 'action'">
          <button mat-icon-button color="primary" matTooltip="Editar Solicitud" (click)="onSelectRow(row, 'edit'); $event.stopPropagation()">
            <mat-icon>edit</mat-icon>
          </button>
        </ng-container>
        <ng-container *ngIf="column.type === 'download'">
          <button mat-icon-button color="primary" matTooltip="Descargar Documento" (click)="onSelectRow(row, 'download'); $event.stopPropagation()">
            <mat-icon>download</mat-icon>
          </button>
        </ng-container>
        <ng-container *ngIf="column.type !== 'action' && column.type !== 'download'">
          {{ getColumnValue(row, column.name) }}
        </ng-container>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumnNames"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumnNames"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" [attr.colspan]="displayedColumnNames.length">No existen Registros.</td>
    </tr>
  </table>

  <mat-menu #filterMenu="matMenu">
    <button mat-menu-item *ngIf="activeFilterOptions[activeColumn]" (click)="clearFilter(activeColumn)">
      <mat-icon>clear</mat-icon> Limpiar Filtro
    </button>
    <button mat-menu-item *ngFor="let option of getFilterOptions(activeColumn)"
      (click)="applyFilterForColumn(activeColumn, option.value)"
      [class.active]="isFilterActive(activeColumn, option.value)">
      {{ option.name }}
    </button>
  </mat-menu>
</div>

<mat-paginator
  #paginator
  [length]="tableParams.totalElements"
  [pageSize]="tableParams.pageSize"
  [pageIndex]="tableParams.pageIndex"
  (page)="onPageChange($event)"
  showFirstLastButtons
  [pageSizeOptions]="[5, 10, 25]"
  aria-label="Seleccionar página de resultados">
</mat-paginator>
